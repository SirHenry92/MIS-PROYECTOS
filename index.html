<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Herramientas Corporativas</title>
    <!-- Importamos la fuente premium 'Inter' de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Cabecera con degradado moderno */
        .hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            padding: 70px 20px 90px 20px;
            text-align: center;
            color: white;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
        }
        .hero p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin: 0;
            font-weight: 300;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Buscador flotante tipo Apple/Google */
        .search-wrapper {
            position: relative;
            max-width: 650px;
            margin: -35px auto 50px auto;
        }
        .search-input {
            width: 100%;
            padding: 22px 25px 22px 60px;
            font-size: 1.05rem;
            border: none;
            border-radius: 50px;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            outline: none;
            font-family: inherit;
            color: var(--text-main);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .search-input:focus {
            box-shadow: 0 15px 35px -5px rgba(37, 99, 235, 0.15);
            transform: translateY(-2px);
        }
        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        /* Cuadrícula de tarjetas */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding-bottom: 80px;
        }

        /* Diseño de Tarjetas Glass/Soft UI */
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeIn 0.6s ease-out forwards;
        }
        /* Línea superior azul que aparece al hacer hover */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            border-color: #e2e8f0;
        }
        .card:hover::before {
            opacity: 1;
        }
        
        .card-icon {
            width: 54px;
            height: 54px;
            background: #eff6ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }
        .card p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0 0 25px 0;
            line-height: 1.5;
            flex-grow: 1;
        }
        .tag {
            font-family: 'Inter', monospace;
            font-size: 0.75rem;
            background: #f8fafc;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            align-self: flex-start;
            transition: all 0.2s ease;
        }
        .card:hover .tag {
            background: #f1f5f9;
            color: #64748b;
        }

        .estado {
            text-align: center;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 40px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Portal de Herramientas</h1>
        <p>Centro de utilidades operativas y contables</p>
    </div>

    <div class="container">
        <!-- Buscador flotante -->
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="buscador" class="search-input" placeholder="Buscar herramienta, reporte o módulo...">
        </div>

        <!-- Cuadrícula donde aparecerán las herramientas -->
        <div id="lista-archivos" class="grid-container"></div>
        <div id="mensaje-estado" class="estado">Sincronizando con el directorio...</div>
    </div>

    <script>
        const usuarioGitHub = "SirHenry92";
        const nombreRepositorio = "MIS-PROYECTOS";
        const urlAPI = `https://api.github.com/repos/${usuarioGitHub}/${nombreRepositorio}/contents/`;
        
        const contenedor = document.getElementById('lista-archivos');
        const estado = document.getElementById('mensaje-estado');
        const buscador = document.getElementById('buscador');

        async function cargarArchivos() {
            try {
                const respuesta = await fetch(urlAPI);
                if (!respuesta.ok) throw new Error("No se pudo conectar con el servidor.");
                
                const archivos = await respuesta.json();
                estado.style.display = "none"; 

                let hayArchivos = false;

                for (let archivo of archivos) {
                    if (archivo.name.endsWith('.html') && archivo.name !== 'index.html') {
                        hayArchivos = true;
                        
                        const resHtml = await fetch(archivo.download_url);
                        const textoHtml = await resHtml.text();
                        
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(textoHtml, "text/html");
                        const tituloPagina = doc.querySelector("title") ? doc.querySelector("title").innerText : "Módulo sin título";

                        const enlaceSeguro = encodeURI(archivo.name);
                        
                        contenedor.innerHTML += `
                            <a href="${enlaceSeguro}" class="card">
                                <div class="card-icon">📄</div>
                                <h2>${tituloPagina}</h2>
                                <p>Haga clic para iniciar esta herramienta en su navegador.</p>
                                <span class="tag">${archivo.name}</span>
                            </a>
                        `;
                    }
                }

                if (!hayArchivos) {
                    estado.style.display = "block";
                    estado.innerText = "No hay módulos disponibles en este momento.";
                }

            } catch (error) {
                estado.style.display = "block";
                estado.innerHTML = `<span style="color:#ef4444;"><b>Error de conexión:</b> ${error.message}</span>`;
            }
        }

        // Filtro de búsqueda animado
        buscador.addEventListener('input', function(e) {
            const textoBusqueda = e.target.value.toLowerCase();
            const tarjetas = document.querySelectorAll('.card');
            
            tarjetas.forEach(tarjeta => {
                const contenidoTarjeta = tarjeta.innerText.toLowerCase();
                if(contenidoTarjeta.includes(textoBusqueda)) {
                    tarjeta.style.display = "flex";
                } else {
                    tarjeta.style.display = "none";
                }
            });
        });

        cargarArchivos();
    </script>

</body>
</html>
